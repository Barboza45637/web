name: CI/CD Frontend - TecLoja Web

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Código Fonte
      uses: actions/checkout@v3

    - name: Configurar Node.js 20
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'

    - name: Instalar Dependências
      run: npm ci

    - name: Build de Produção
      run: npm run build

    - name: Instalar Netlify CLI
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: npm install -g netlify-cli

    - name: Deploy de Produção para Netlify
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      # IMPORTANTE: o projeto foi criado com "ng new web", então a build gera dist/web/browser
      # (não dist/tecloja/browser). Confira sempre o outputPath em angular.json.
      run: netlify deploy --dir=dist/web/browser --prod
